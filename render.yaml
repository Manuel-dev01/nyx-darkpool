# Render Blueprint — Nyx engine + Postgres (the on-chain backend).
# Deploy: push this repo to GitHub, then Render Dashboard → New → Blueprint →
# connect the repo → Apply. Render reads this file, provisions the database, and
# builds + runs engine/Dockerfile (which bakes the circuit artifacts + stellar
# CLI and auto-generates + friendbot-funds a testnet submitter on boot). The web
# frontend deploys separately to Vercel (set ENGINE_ORIGIN to this service's URL).
#
# Notes / free-tier caveats:
#   - Free web services sleep after ~15 min idle (cold start ~1 min). Fine for an
#     interactive demo; for a 24/7 matcher use a paid instance or a background worker.
#   - Free Postgres has a limited lifetime — see Render's docs.
#   - The engine listens on Render's injected $PORT (handled by docker-entrypoint.sh).

databases:
  - name: nyx-postgres
    plan: free
    databaseName: nyx
    user: nyx

services:
  - type: web
    name: nyx-engine
    runtime: docker
    plan: free
    dockerfilePath: ./engine/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Postgres connection (Render injects the provisioned DB's URL).
      - key: NYX_DATABASE_URL
        fromDatabase:
          name: nyx-postgres
          property: connectionString
      # On-chain settlement on public Stellar testnet (the deployed nyx-verifier).
      - key: NYX_SOROBAN_CONTRACT_ID
        value: CBAFC6W5IWQC5AB6LFMFI4KB4DZT23BU2O2AJ2H3B2727DO37DOJGJRV
      - key: NYX_SOROBAN_NETWORK
        value: testnet
      # Engine is public (Vercel calls it) → require signed orders (frontend signs).
      - key: NYX_REQUIRE_ORDER_SIG
        value: "true"
      - key: NYX_LOG_LEVEL
        value: info
      # Persistent at-rest key so resting orders survive a restart. Render free
      # services SLEEP after ~15 min idle and cold-start as a fresh container — an
      # ephemeral key would be lost, making any order that rested across the sleep
      # undecodable (silently unmatchable). `sync: false` means "set me in the
      # Render dashboard, don't read from git" — paste a 64-hex (32-byte) secret
      # there once (e.g. `openssl rand -hex 32`). It's a cloud secret, never on
      # disk in the repo. Leave the dashboard value blank to fall back to an
      # ephemeral key (fine for a quick demo; orders die on the next sleep).
      - key: NYX_BLOB_KEY
        sync: false
