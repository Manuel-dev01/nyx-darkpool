<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Nyx eclipse mark on the void: faint full ring (the whole book) + one
       luminous crescent (the single proven match). Matches _components/Eclipse. -->
  <rect width="100" height="100" rx="22" fill="#07080A"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#23272E" stroke-width="9"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#3BD7E0" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="143 214" transform="rotate(-62 50 50)"/>
</svg>
